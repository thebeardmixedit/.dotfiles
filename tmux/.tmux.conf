set -g default-terminal "tmux-256color"
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard

# Statusline position
set -g status-position top

# Add one transparent padding row under the statusline
set -g status 2
set -g status-format[1] "#[bg=default] "

bind r source-file ~/.tmux.conf \; display "Reloaded"

# Spliting
bind C-v split-window -h
bind C-h split-window -v

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Selecting
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Windows
bind C-w new-window
bind C-c kill-window
bind -r C-j select-window -t :-
bind -r C-k select-window -t :+

# Sessions
bind S command-prompt -p "Session name:" \
  "new-session -A -s '%%' -c '#{pane_current_path}'"

bind-key C-p display-popup \
    -E \
    -w 65% \
    -h 75% \
    -s 'bg=#0a0a0a' \
    -S 'fg=#6c7086,bg=#0a0a0a' \
    'tmux-sessionizer -s "${CODE}" -e "${CODE}/personal" -e "${CODE}/neovim"'

bind-key C-b display-popup \
    -E \
    -w 65% \
    -h 75% \
    -s 'bg=#0a0a0a' \
    -S 'fg=#6c7086,bg=#0a0a0a' \
    'tmux-sessionizer "${DOTFILES}"'

bind-key C-n display-popup \
    -E \
    -w 65% \
    -h 75% \
    -s 'bg=#0a0a0a' \
    -S 'fg=#6c7086,bg=#0a0a0a' \
    'tmux-sessionizer -s "${NEOVIM}"'

# Copy mode / Vi mode
set -g mode-keys vi

# Enter copy mode with prefix v
bind v copy-mode

# Movement in copy mode
bind -T copy-mode-vi h send -X cursor-left
bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi k send -X cursor-up
bind -T copy-mode-vi l send -X cursor-right

bind -T copy-mode-vi w send -X next-word
bind -T copy-mode-vi b send -X previous-word
bind -T copy-mode-vi e send -X next-word-end

bind -T copy-mode-vi 0 send -X start-of-line
bind -T copy-mode-vi ^ send -X back-to-indentation
bind -T copy-mode-vi '$' send -X end-of-line

bind -T copy-mode-vi g send -X history-top
bind -T copy-mode-vi G send -X history-bottom

bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi C-b send -X page-up
bind -T copy-mode-vi C-f send -X page-down

# Search
bind -T copy-mode-vi / command-prompt -i -p "Search down:" "send -X search-forward-incremental '%%'"
bind -T copy-mode-vi ? command-prompt -i -p "Search up:" "send -X search-backward-incremental '%%'"
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi N send -X search-reverse

# Selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Copy to macOS clipboard and exit copy mode
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Escape/cancel like Vim
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi q send -X cancel

# Plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Catppuccin
set -g @catppuccin_flavor 'mocha'

# Make empty statusline space transparent/default terminal background.
set -g @catppuccin_status_background 'none'
set -g status-style 'bg=default'

# Transparency/default backgrounds
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
set -g pane-border-style 'bg=default'
set -g pane-active-border-style 'bg=default'

# Popup styling
set -g popup-style 'bg=#0a0a0a'
set -g popup-border-style 'fg=#6c7086,bg=#0a0a0a'

# Keep the native tmux window list anchored to the left.
set -g status-justify left
set -g status-left ""
set -g status-left-length 0
set -g status-right-length 100

# Remove extra spacing between native tmux window items.
set -g window-status-separator ""

# Force custom rounded window bubbles.
set -g @catppuccin_window_status_style 'custom'
set -g @catppuccin_window_middle_separator ''

# Window icon mapping
set -g @window_icon '#{?#{==:#{pane_current_command},nvim},,#{?#{==:#{pane_current_command},vim},,#{?#{==:#{pane_current_command},zsh},,#{?#{==:#{pane_current_command},bash},,󰘔}}}}'

# Inactive window bubble
set -g @catppuccin_window_number ""
set -g @catppuccin_window_text " #{E:@window_icon} #{=10:window_name} "

set -g @catppuccin_window_number_color "#{@thm_surface_0}"
set -g @catppuccin_window_text_color "#{@thm_surface_0}"

set -g @catppuccin_window_left_separator "#[fg=#{@thm_surface_0},bg=default]"
set -g @catppuccin_window_right_separator "#[fg=#{@thm_surface_0},bg=default] "

# Current window bubble
# Put the visible label in the number slot so it avoids the inverted text segment.
set -g @catppuccin_window_current_number "#[fg=#{@thm_mauve},bg=#{@thm_surface_0}] #{E:@window_icon} #[fg=#{@thm_text},bg=#{@thm_surface_0}]#{=10:window_name} "
set -g @catppuccin_window_current_text ""

# The active window uses the same gray body as the right-side modules.
set -g @catppuccin_window_current_number_color "#{@thm_surface_0}"
set -g @catppuccin_window_current_text_color "#{@thm_surface_0}"

set -g @catppuccin_window_current_left_separator "#[fg=#{@thm_mauve},bg=default]"
set -g @catppuccin_window_current_middle_separator ""
set -g @catppuccin_window_current_right_separator "#[fg=#{@thm_mauve},bg=default] "

# No current/last/zoom/bell flag icon after the name.
set -g @catppuccin_window_flags "none"

# Right-side module bubbles
set -g @catppuccin_status_left_separator ''
set -g @catppuccin_status_middle_separator ''
set -g @catppuccin_status_right_separator ''
set -g @catppuccin_status_connect_separator 'no'

# Right side modules
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right " "
set -ag status-right "#{E:@catppuccin_status_session}"

# Initialize tpack (keep this line at the very bottom of tmux.conf)
run 'tpack init'
